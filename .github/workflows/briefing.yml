name: Economics Journal Briefing

on:
  # ── Schedule ──────────────────────────────────────────────────────────────
  # Edit the cron line below to change when the email is sent.
  # Format:  minute  hour  day  month  weekday
  # All times are UTC. Use https://crontab.guru to build your expression.
  #
  # Common examples:
  #   "0 7 * * 1"       →  Every Monday at 07:00 UTC          (weekly)
  #   "0 1 * * 1"       →  Every Monday at 01:00 UTC = 9am Beijing/HK
  #   "0 9 * * 1"       →  Every Monday at 09:00 UTC = 9am London
  #   "0 14 * * 1"      →  Every Monday at 14:00 UTC = 9am New York
  #   "0 7 1 * *"       →  1st of every month at 07:00 UTC     (monthly)
  #   "0 7 1,15 * *"    →  1st and 15th of every month         (twice monthly)
  # schedule:
  #   - cron: "0 7 * * 1"   # ← CHANGE THIS LINE to set your schedule

  # ── Manual trigger ────────────────────────────────────────────────────────
  # Run at any time from the Actions tab (useful for testing)
  workflow_dispatch:
    inputs:
      days_lookback:
        description: "Days back to look for papers (default: 8 for weekly, 32 for monthly)"
        required: false
        default: "8"

concurrency:
  group: econ-briefing
  cancel-in-progress: false

jobs:
  send-briefing:
    name: Fetch papers & send email
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser resend

      - name: Run briefing script
        env:
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL:  ${{ secrets.RECIPIENT_EMAIL }}
          DAYS_LOOKBACK:    ${{ github.event.inputs.days_lookback || '8' }}
        run: python briefing.py

      - name: Save deduplication state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_papers.json
          git diff --cached --quiet || git commit -m "chore: update sent_papers.json [skip ci]"
          git push
